version: '3.8'

services:
  shopglide-rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopglide-rag-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
